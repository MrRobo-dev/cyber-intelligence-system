<body class="p-4 md:p-10">

  <div class="max-w-6xl mx-auto space-y-8">

    <div class="glass-card rounded-[2.5rem] shadow-2xl overflow-hidden">

      <div class="bg-gray-900 p-6 text-center">

        <h2 class="text-xl font-semibold text-white uppercase tracking-widest">User Registration Portal</h2>

      </div>

      <form id="registrationForm" class="p-8 grid grid-cols-1 md:grid-cols-3 gap-6">

        <div>

          <label for="fullName" class="block text-sm font-medium text-gray-600 mb-1 ml-2">Full Name</label>

          <input type="text" id="fullName" name="fullName" required placeholder="Enter name" class="w-full px-5 py-3 rounded-2xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-indigo-100 outline-none transition-all">

        </div>

        <div>

          <label for="fatherName" class="block text-sm font-medium text-gray-600 mb-1 ml-2">Father's Name</label>

          <input type="text" id="fatherName" name="fatherName" required placeholder="Enter father's name" class="w-full px-5 py-3 rounded-2xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-4 focus:ring-indigo-100 outline-none transition-all">

        </div>

  <script>
    const form = document.getElementById('registrationForm');
    const tableBody = document.getElementById('dataTableBody');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      // Get Form Data
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      // Create Table Row
      const row = document.createElement('tr');
      row.className = "border-t border-gray-50 hover:bg-gray-50 transition-colors group";
      row.innerHTML = `

                <td class="py-4 pl-4">

                    <div class="font-semibold text-indigo-900">${data.fullName}</div>

                    <div class="text-xs text-gray-400">S/O: ${data.fatherName}</div>

                </td>

                <td class="py-4">

                    <div class="text-sm font-medium">${data.mobile}</div>

                    <div class="text-[10px] text-gray-400 font-mono uppercase">${data.idCard}</div>

                </td>

                <td class="py-4">

                    <div class="text-sm">${data.state}</div>

                    <div class="text-xs text-gray-400">${data.pincode}</div>

                </td>

                <td class="py-4 text-center">

                    <button onclick="deleteRow(this)" class="text-red-400 hover:text-red-600 font-bold text-sm bg-red-50 px-3 py-1 rounded-lg transition-all">Delete</button>

                </td>

            `;
      // Append and Reset
      tableBody.prepend(row);
      form.reset();
      alert('Data Saved Successfully!');
    });

    function deleteRow(btn) {
      if (confirm('Are you sure you want to delete this record?')) {
        btn.closest('tr').remove();
      }
    }
  </script>
